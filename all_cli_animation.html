<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Collapse Loader</title>
    <!-- Include Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body class="bg-white flex items-center justify-center font-sans">
    
    <!-- Canvas for the Particle Engine -->
    <canvas id="loaderCanvas"></canvas>

    <script>
        const canvas = document.getElementById('loaderCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, cx, cy;
        let particles = [];
        
        // --- System Configuration ---
        const OUTER_SPOKES = 12;
        const INNER_SPOKES = 8;
        const PARTICLES_PER_SPOKE = 40;
        const TOTAL_PARTICLES = (OUTER_SPOKES + INNER_SPOKES) * PARTICLES_PER_SPOKE; // 800 particles
        
        const GLOBE_RADIUS = 36;
        const TICK_RADIUS = 36;
        const PARTICLE_COLOR = '#9ca3af'; // Tailwind gray-400

        // Handle window resizing
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            cx = width / 2;
            cy = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Math Helper: Distance from a point to a line segment
        function distToSegment(p, v, w) {
            let l2 = (w.x - v.x)*(w.x - v.x) + (w.y - v.y)*(w.y - v.y);
            if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        // Generates the initial particle layout for the Tick shape
        function generateTickData(targetCount) {
            let bestData = [];
            let minDiff = Infinity;
            
            // The exact skeleton of the checkmark
            const p1 = {x: -14, y: 2};
            const p2 = {x: -4, y: 12};
            const p3 = {x: 16, y: -8};
            const CUTOUT_THICKNESS = 6.5; 

            // Find the perfect density to get exactly ~800 particles in concentric rings
            for(let density = 0.8; density < 3.0; density += 0.01) {
                let temp = [];
                let rings = Math.floor(TICK_RADIUS * density);
                for(let i = 0; i <= rings; i++) {
                    let r = (i / rings) * TICK_RADIUS;
                    let pts = i === 0 ? 1 : Math.floor(2 * Math.PI * r * density);
                    for(let j = 0; j < pts; j++) {
                        let theta = (j / pts) * Math.PI * 2;
                        let px = r * Math.cos(theta);
                        let py = r * Math.sin(theta);
                        
                        let d1 = distToSegment({x: px, y: py}, p1, p2);
                        let d2 = distToSegment({x: px, y: py}, p2, p3);
                        
                        // Keep particle if it's strictly outside the checkmark thickness
                        if (d1 > CUTOUT_THICKNESS && d2 > CUTOUT_THICKNESS) {
                            temp.push({x: px, y: py});
                        }
                    }
                }
                
                if (Math.abs(temp.length - targetCount) < minDiff) {
                    minDiff = Math.abs(temp.length - targetCount);
                    bestData = temp;
                    if (minDiff === 0) break;
                }
            }
            
            // Trim or clone so we have exactly the required particle count to prevent errors
            while(bestData.length > targetCount) bestData.splice(Math.floor(Math.random() * bestData.length), 1);
            while(bestData.length < targetCount) bestData.push({x: bestData[0].x, y: bestData[0].y});
            
            return bestData;
        }

        // --- Initialization ---
        function initParticles() {
            particles = [];
            let loaderData = [];
            let globeData = [];
            let tickData = [];
            
            // 1. Generate Loader Positions (The Spokes)
            for(let i = 0; i < OUTER_SPOKES; i++) {
                let angle = (i / OUTER_SPOKES) * Math.PI * 2;
                for(let j = 0; j < PARTICLES_PER_SPOKE; j++) {
                    let t = j / (PARTICLES_PER_SPOKE - 1);
                    loaderData.push({ type: 'outer', angle: angle, r: 32 + t * 10, pRadius: 2.5 });
                }
            }
            for(let i = 0; i < INNER_SPOKES; i++) {
                let angle = (i / INNER_SPOKES) * Math.PI * 2;
                for(let j = 0; j < PARTICLES_PER_SPOKE; j++) {
                    let t = j / (PARTICLES_PER_SPOKE - 1);
                    loaderData.push({ type: 'inner', angle: angle, r: 16 + t * 6, pRadius: 1.8 });
                }
            }

            // 2. Generate Globe Positions (Latitudes & Longitudes)
            for(let i = 0; i < 12; i++) {
                let theta = (i / 12) * Math.PI * 2;
                for(let j = 0; j < 40; j++) {
                    let phi = (j / 39) * Math.PI; 
                    globeData.push({ theta: theta, phi: phi });
                }
            }
            for(let i = 0; i < 8; i++) {
                let phi = ((i + 1) / 9) * Math.PI; 
                for(let j = 0; j < 40; j++) {
                    let theta = (j / 40) * Math.PI * 2;
                    globeData.push({ theta: theta, phi: phi });
                }
            }

            // 3. Generate initial Tick Positions using math
            tickData = generateTickData(TOTAL_PARTICLES);

            // Shuffle destinations to create chaotic swarming during transitions
            for (let i = globeData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [globeData[i], globeData[j]] = [globeData[j], globeData[i]];
                
                const k = Math.floor(Math.random() * (i + 1));
                [tickData[i], tickData[k]] = [tickData[k], tickData[i]];
            }

            // Combine them into a single unified particle object
            for(let i = 0; i < TOTAL_PARTICLES; i++) {
                particles.push({
                    l: loaderData[i],
                    g: globeData[i],
                    t: tickData[i]
                });
            }
        }

        // Easing function
        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        // Extracts exactly where a particle should be depending on the active shape
        function getShapePos(shapeType, p, time) {
            if (shapeType === 'l') {
                const loaderOuterAngle = time * 0.0015;
                const loaderInnerAngle = -time * 0.0025;
                const lAngle = p.l.angle + (p.l.type === 'outer' ? loaderOuterAngle : loaderInnerAngle);
                return { x: Math.cos(lAngle) * p.l.r, y: Math.sin(lAngle) * p.l.r, z: 0, pRadius: p.l.pRadius, is3D: false };
            } 
            else if (shapeType === 'g') {
                const earthSpinAngle = time * 0.001;
                const currentTheta = p.g.theta + earthSpinAngle;
                return {
                    x: Math.sin(p.g.phi) * Math.cos(currentTheta) * GLOBE_RADIUS,
                    y: Math.cos(p.g.phi) * GLOBE_RADIUS,
                    z: Math.sin(p.g.phi) * Math.sin(currentTheta) * GLOBE_RADIUS,
                    pRadius: 1.2, is3D: true
                };
            }
            else if (shapeType === 't') {
                return { x: p.t.x, y: p.t.y, z: 0, pRadius: 2.4, is3D: false }; 
            }
        }

        // --- Main Animation Loop ---
        function animate(time) {
            ctx.clearRect(0, 0, width, height);
            
            // --- 24-Second Timeline Logic ---
            const CYCLE_TIME = 24000;
            let t = time % CYCLE_TIME;
            
            let shape1 = 'l', shape2 = 'l', localPhase = 0;

            if (t < 2500) { shape1 = 'l'; shape2 = 'l'; localPhase = 0; } // Loader
            else if (t < 4000) { shape1 = 'l'; shape2 = 'g'; localPhase = (t - 2500) / 1500; } // Loader -> Globe
            else if (t < 9000) { shape1 = 'g'; shape2 = 'g'; localPhase = 0; } // Globe (5s)
            else if (t < 10500) { shape1 = 'g'; shape2 = 'l'; localPhase = (t - 9000) / 1500; } // Globe -> Loader
            else if (t < 17000) { shape1 = 'l'; shape2 = 'l'; localPhase = 0; } // Loader (6.5s)
            else if (t < 18500) { shape1 = 'l'; shape2 = 't'; localPhase = (t - 17000) / 1500; } // Loader -> Tick
            else if (t < 21500) { shape1 = 't'; shape2 = 't'; localPhase = 0; } // Tick (3s)
            else if (t < 23000) { shape1 = 't'; shape2 = 'l'; localPhase = (t - 21500) / 1500; } // Tick -> Loader
            else { shape1 = 'l'; shape2 = 'l'; localPhase = 0; } // Back to Loader Buffer

            const ePhase = easeInOutCubic(localPhase);
            
            // Pinch and Swirl only happen during transitions
            const pinchFactor = 1.0 - Math.sin(ePhase * Math.PI) * 0.9;
            const swirlFactor = Math.sin(ePhase * Math.PI) * Math.PI * 1.5;
            
            // "Solidification" Opacities: Crossfade particles out and perfect vector shape in
            let vOpacity = 0.0;
            let pTargetAlpha = 1.0;

            if (shape1 === 't' && shape2 === 't') {
                vOpacity = 1.0;
                pTargetAlpha = 0.0; // Hide particles fully when tick is solid
            } else if (shape2 === 't') {
                vOpacity = Math.pow(ePhase, 4); 
                pTargetAlpha = 1.0 - Math.pow(ePhase, 4);
            } else if (shape1 === 't') {
                vOpacity = Math.pow(1 - ePhase, 4);
                pTargetAlpha = 1.0 - Math.pow(1 - ePhase, 4);
            }

            const perspective = 300;
            ctx.fillStyle = PARTICLE_COLOR;

            // --- 1. Draw Swarming Particles ---
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];

                const pos1 = getShapePos(shape1, p, time);
                const pos2 = getShapePos(shape2, p, time);

                // Apply Collapse (Pinch)
                let currentX = (pos1.x + (pos2.x - pos1.x) * ePhase) * pinchFactor;
                let currentY = (pos1.y + (pos2.y - pos1.y) * ePhase) * pinchFactor;
                let currentZ = (pos1.z + (pos2.z - pos1.z) * ePhase) * pinchFactor;

                // Apply Swirl
                const s = Math.sin(swirlFactor);
                const c = Math.cos(swirlFactor);
                const rx = currentX * c - currentY * s;
                const ry = currentX * s + currentY * c;
                currentX = rx;
                currentY = ry;

                // Project 3D onto 2D Canvas
                const scale = perspective / (perspective + currentZ);
                const projX = cx + currentX * scale;
                const projY = cy + currentY * scale;

                // Opacity logic (depth shading for the globe)
                let opacity = 1.0;
                let is3DMix = (shape1 === 'g' ? 1 - ePhase : 0) + (shape2 === 'g' ? ePhase : 0);
                if (is3DMix > 0) {
                    const depthOpacity = 0.3 + 0.7 * (1 - (currentZ + GLOBE_RADIUS) / (2 * GLOBE_RADIUS));
                    opacity = 1.0 - is3DMix * (1.0 - depthOpacity);
                }
                
                // Fade out particles seamlessly as the vector tick forms
                let finalOpacity = opacity * pTargetAlpha;
                
                if (finalOpacity > 0.01) {
                    ctx.globalAlpha = Math.max(0.01, finalOpacity);
                    const currentPRadius = pos1.pRadius + (pos2.pRadius - pos1.pRadius) * ePhase;
                    const size = currentPRadius * scale;

                    ctx.beginPath();
                    ctx.arc(projX, projY, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // --- 2. Draw the "Flawless" Vector Shape Over The Particles ---
            // As particles settle, this fades in to completely smooth out the jagged edges
            if (vOpacity > 0.01) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(pinchFactor, pinchFactor);
                ctx.rotate(swirlFactor);
                
                ctx.globalAlpha = vOpacity;
                ctx.fillStyle = PARTICLE_COLOR;
                
                // Draw a perfect solid circle
                ctx.beginPath();
                ctx.arc(0, 0, TICK_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                
                // Laser-carve the transparent checkmark perfectly using destination-out
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = '#000'; // Color doesn't matter for erasing
                ctx.lineWidth = 13;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(-14, 2);
                ctx.lineTo(-4, 12);
                ctx.lineTo(16, -8);
                ctx.stroke();
                
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        // Start Engine
        initParticles();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
